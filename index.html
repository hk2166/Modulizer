<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Prevent the WebKitGTK webview from caching the startup shell, which
         previously served stale JS after edits during dev. -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>VoiceForge</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- Loading / startup screen shown while the Python backend boots -->
    <main class="shell" id="loadingShell">
      <div class="brand">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="vfGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00e5ff"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <rect x="1.25" y="1.25" width="37.5" height="37.5" rx="10" fill="#12121a" stroke="url(#vfGrad)" stroke-width="1.5"/>
          <path d="M12 20c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8-8-3.6-8-8z" fill="none" stroke="url(#vfGrad)" stroke-width="2.5"/>
          <path d="M20 13v14M14 17l6-4 6 4" stroke="#e8e8f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">VoiceForge</span>
      </div>

      <div class="status-area">
        <div class="spinner" id="spinner" aria-label="Loading"></div>
        <p class="status-text" id="statusText">Starting up…</p>
      </div>

      <!-- Model download progress — hidden until a download is in progress -->
      <div class="download-area" id="downloadArea" hidden>
        <p class="download-label" id="downloadLabel">Downloading voice engine…</p>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
        <p class="download-note" id="downloadNote">One-time download, ~2 GB. Won't happen again.</p>
      </div>

      <p class="tagline">Local voice cloning. Nothing leaves your machine.</p>
    </main>

    <!-- The Gradio app loads in this iframe once the backend is ready -->
    <iframe
      id="appFrame"
      hidden
      style="position:fixed;inset:0;width:100%;height:100%;border:none;"
      title="VoiceForge App"
    ></iframe>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
